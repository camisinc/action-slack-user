name: Slack User Release

on:
  workflow_dispatch:
  push: 
    branches: 
      - main
    paths:
      - '.github/workflows/release.yml'
      - 'src/**'
      - 'dist/**'
      - 'action.yml'
      - 'GitVersion.yml'

jobs:
  release:
    name: Create a Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0

      - name: Install GitVersion Tool
        uses: gittools/actions/gitversion/setup@bc6623af8fc07d5a8903052dd46da33403eec8e8 # v4.5.0
        with:
          versionSpec: '6.3.0'

      - name: Calculate SemVer
        id:   gitversion
        uses: gittools/actions/gitversion/execute@bc6623af8fc07d5a8903052dd46da33403eec8e8 # v4.5.0
        with:
          configFilePath: GitVersion.yml

      - name: Create a release for new tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ steps.gitversion.outputs.majorMinorPatch }} --title "${{ steps.gitversion.outputs.majorMinorPatch }}" --generate-notes